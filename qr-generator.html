<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Kod Üretici</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e8e8f0; font-family:'DM Sans',sans-serif; padding:24px; }
h1 { font-family:'Space Mono',monospace; font-size:16px; margin-bottom:8px; color:#4cc9f0; }
.note { font-size:13px; color:#6060a0; margin-bottom:20px; line-height:1.6; }
.url-row { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
input {
  flex:1; min-width:240px; background:#12121a; border:1px solid rgba(255,255,255,0.1);
  color:#e8e8f0; border-radius:8px; padding:10px 14px; font-size:14px; font-family:'Space Mono',monospace;
}
button {
  background:#4cc9f0; color:#0a0a0f; border:none; border-radius:8px;
  padding:10px 20px; cursor:pointer; font-weight:600; font-size:13px;
}
button:hover { background:#7bd7f5; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(90px, 1fr));
  gap:8px;
}
.qr-cell {
  background:#12121a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;
  padding:8px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.qr-sym {
  font-family:'Space Mono',monospace;
  font-size:11px;
  font-weight:700;
  color:#4cc9f0;
}
.qr-z {
  font-size:9px;
  color:#6060a0;
}
.qr-box { width:64px; height:64px; }
.qr-box canvas, .qr-box img { width:64px!important; height:64px!important; }
.print-btn {
  margin-top:20px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#e8e8f0;
  border-radius:8px;
  padding:10px 24px;
  cursor:pointer;
  font-size:13px;
}
@media print {
  body { background:white; color:black; }
  .url-row, .note, h1, .print-btn { display:none!important; }
  .grid { grid-template-columns:repeat(10,1fr); gap:4px; }
  .qr-cell { background:white; border-color:#ddd; padding:4px; }
  .qr-sym { color:black; font-size:9px; }
  .qr-z { color:#888; }
}
</style>
</head>
<body>
<h1>📱 QR Kod Üretici</h1>
<div class="note">
  1. Aşağıya sitenin URL'sini yaz (örn: <code style="color:#f72585">https://senin-kullanici-adin.github.io/periodictable/</code>)<br>
  2. "QR Üret" butonuna bas → 118 element için QR otomatik oluşur<br>
  3. Sağ alttaki "Yazdır" butonu ile hepsini kağıda bas → kes ve modele yapıştır
</div>
<div class="url-row">
  <input type="text" id="baseUrl" placeholder="https://senin-siten.github.io/periodictable/" value="https://senin-siten.github.io/periodictable/">
  <button onclick="generateAll()">QR Üret</button>
</div>
<div class="grid" id="qrGrid"></div>
<button class="print-btn" onclick="window.print()">🖨 Yazdır (118 QR)</button>

<script src="elements_data.js"></script>
<script>
function generateAll() {
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';
  ELEMENTS.forEach(el => {
    const url = base + '/element.html?z=' + el.z;
    const cell = document.createElement('div');
    cell.className = 'qr-cell';
    cell.innerHTML = `<div class="qr-sym">${el.sym}</div><div class="qr-z">${el.z}</div><div class="qr-box" id="qr${el.z}"></div>`;
    grid.appendChild(cell);
    setTimeout(() => {
      new QRCode(document.getElementById('qr' + el.z), {
        text: url, width:64, height:64,
        colorDark:'#000000', colorLight:'#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }, el.z * 8);
  });
}
generateAll();
</script>
</body>
</html>
